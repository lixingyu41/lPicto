x-paths:
  media: &media-source ${LPICTO_MEDIA:-./data/Media}
  data: &data-source ${LPICTO_DATA:-./data/app}
  cache: &cache-source ${LPICTO_CACHE:-./data/cache}

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${LPICTO_BIND:-127.0.0.1}:${LPICTO_PORT:-18080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - type: bind
        source: *cache-source
        target: /cache
        read_only: true
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    group_add:
      - "${LPICTO_MEDIA_GID:-950}"
    volumes:
      - type: bind
        source: *media-source
        target: /Media
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: *data-source
        target: /data
      - type: bind
        source: *cache-source
        target: /cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    command: ["worker"]
    group_add:
      - "${LPICTO_MEDIA_GID:-950}"
    volumes:
      - type: bind
        source: *media-source
        target: /Media
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: *data-source
        target: /data
      - type: bind
        source: *cache-source
        target: /cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=media
      - POSTGRES_USER=media
      - POSTGRES_PASSWORD=media
      - PGDATA=/lpicto-data/postgres
    volumes:
      - type: bind
        source: *data-source
        target: /lpicto-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media -d media"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["sh", "-c", "mkdir -p /lpicto-data/redis && redis-server --appendonly yes --dir /lpicto-data/redis"]
    volumes:
      - type: bind
        source: *data-source
        target: /lpicto-data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
